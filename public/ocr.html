<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map OCR Tool</title>
  <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    #status { font-size: 18px; color: #ffb86c; margin-bottom: 20px; }
    #results { white-space: pre-wrap; background: #222; padding: 15px; border-radius: 5px; max-height: 500px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Tesseract.js Map OCR</h1>
  <div id="status">Initializing Tesseract...</div>
  <div id="results"></div>

  <script>
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    async function runOCR() {
      try {
        statusEl.innerText = "Loading image...";
        const img = new Image();
        img.src = '/map-img/mtmmap.jpg';
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });

        statusEl.innerText = "Running OCR (this may take 20-30 seconds)...";
        
        const worker = await Tesseract.createWorker({
          logger: m => {
            if (m.status === 'recognizing text') {
              statusEl.innerText = `Recognizing text: ${(m.progress * 100).toFixed(1)}%`;
            }
          }
        });
        
        await worker.loadLanguage('ind+eng');
        await worker.initialize('ind+eng');
        
        const { data: { words } } = await worker.recognize(img);
        
        statusEl.innerText = "OCR Complete! Processing coordinates...";
        
        const imgWidth = img.naturalWidth;
        const imgHeight = img.naturalHeight;
        
        let output = "";
        const formattedWords = words.map(w => {
          // Calculate percentage coordinates
          const leftPct = (w.bbox.x0 / imgWidth) * 100;
          const topPct = (w.bbox.y0 / imgHeight) * 100;
          const rightPct = (w.bbox.x1 / imgWidth) * 100;
          const bottomPct = (w.bbox.y1 / imgHeight) * 100;
          
          return {
            text: w.text,
            confidence: w.confidence,
            bbox_pct: [leftPct.toFixed(2), topPct.toFixed(2), rightPct.toFixed(2), bottomPct.toFixed(2)]
          };
        });

        // Output results to screen
        resultsEl.innerHTML = JSON.stringify(formattedWords, null, 2);
        
        // Expose to window for Puppeteer / Subagent
        window.ocrResults = formattedWords;
        statusEl.innerText = "OCR Processing Complete! Exposed to window.ocrResults";
        console.log("OCR Results:", formattedWords);

        await worker.terminate();
      } catch (err) {
        statusEl.innerText = "Error: " + err.message;
        console.error(err);
      }
    }

    runOCR();
  </script>
</body>
</html>
